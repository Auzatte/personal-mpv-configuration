# Tested on an i3-6100U with Intel UHD 520 graphics
input-ipc-server=/tmp/mpvsocket
ad-lavc-threads=4
af=format=doublep:192000
alang=jp,jpn,ja
audio-format=doublep
audio-resample-phase-shift=24
audio-resample-filter-size=32
audio-resample-linear=yes
audio-samplerate=48000
audio-swresample-o=dither_scale=1,dither_method=improved_e_weighted,resampler=soxr,filter_size=32,phase_shift=24,precision=28,cheby=1
blend-subtitles=no
cache=yes
cache-on-disk=yes
cache-secs=16384
correct-downscaling=yes
cscale=spline64
deband=no
demuxer-thread=yes
demuxer-max-bytes=2147483648
demuxer-max-back-bytes=1073741824
dither=error-diffusion
dither-depth=16
dscale=spline64
embeddedfonts=yes
error-diffusion=jarvis-judice-ninke
fbo-format=rgba64f
gamut-mapping-mode=perceptual
gpu-api=opengl
gpu-shader-cache=yes
fullscreen=yes
hls-bitrate=max
hr-seek-framedrop=no
hwdec=auto-safe
hwdec-codecs=all
hwdec-image-format=rgba64
icc-3dlut-size=512x512x512
icc-cache=yes
icc-force-contrast=inf
icc-intent=0
inverse-tone-mapping=yes
linear-downscaling=yes
linear-upscaling=yes
lut-type=normalized
no-border
no-resume-playback
ontop=yes
opengl-early-flush=yes
opengl-es=auto
opengl-pbo=yes
opengl-swapinterval=0
pause=yes
prefetch-playlist=yes
scale=spline64
sigmoid-upscaling=yes
slang=en,eng
spirv-compiler=auto
stream-buffer-size=536870912
sub-ass=yes
sub-ass-scale-with-window=no
sub-ass-vsfilter-color-compat=full
sub-scale-by-window=no
sub-scale-with-window=no
swapchain-depth=1
sws-allow-zimg=no
sws-bitexact=yes
sws-fast=no
sws-scaler=spline
target-contrast=inf
target-prim=dci-p3
target-gamut=dci-p3
target-trc=bt.1886
temporal-dither=yes
temporal-dither-period=1
tone-mapping=spline
vd-lavc-bitexact=yes
vd-lavc-dr=yes
vd-lavc-film-grain=gpu
vd-lavc-threads=4
vd-lavc-show-all=no
vd-lavc-skiploopfilter=none
vf=format=fmt=rgba64:colormatrix=bt.2100-pq:colorlevels=full:primaries=dci-p3:gamma=bt.1886:dolbyvision=yes:hdr10plus=yes:film-grain=yes:force-scaler=sws:convert=yes
video-output-levels=full
vo=gpu-next
ytdl-format=best
